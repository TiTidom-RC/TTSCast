<div class="cmd cmd-widget" data-type="info" data-subtype="string" data-template="default" data-cmd_id="#id#" data-cmd_uid="#uid#" data-version="#version#" data-eqLogic_id="#eqLogic_id#">
    <div class="title #hide_name#">
        <div class="cmdName">#name_display#</div>
    </div>
    <div class="content-sm">
        <span class="imgCmd">
            <img src="./plugins/ttscast/data/images/ttscast-200.png" style="object-fit:cover;object-position:center;max-width:200px;width:100%;margin-top:5px;margin-bottom:5px;" />
        </span>
    </div>
    <div class="timeCmd label label-default #history#" data-type="info"></div>
    <template>
        <div>time : duration|date ({{Affiche durée ou date de la valeur}})</div>
        <div>max-width : 200 ({{Largeur de l'image}})</div>
    </template>
    <script>
        jeedom.cmd.addUpdateFunction('#id#', function (_options) {
            const cmd = document.querySelector('.cmd[data-cmd_uid="#uid#"]')
            if (!cmd) return

            const contentSm = cmd.querySelector('.content-sm')
            const imgElement = contentSm?.querySelector('img')
            const timeCmd = cmd.querySelector('.timeCmd')

            if (contentSm) {
                contentSm.setAttribute('title', `{{Date de valeur}} : ${_options.valueDate}<br>{{Date de collecte}} : ${_options.collectDate}`)
            }

            if (timeCmd && ('#time#' === 'duration' || '#time#' === 'date')) {
                jeedom.cmd.displayDuration(_options.valueDate, timeCmd, '#time#')
            }

            if (imgElement) {
                if (_options.value !== '') {
                    imgElement.src = `./plugins/ttscast/core/php/ttscast.img.proxy.php?img=${btoa(_options.value)}`
                } else {
                    imgElement.src = './plugins/ttscast/data/images/ttscast-200.png'
                }

                if ('#max-width#' !== '') {
                    imgElement.style.maxWidth = '#max-width#px'
                }
            }
        })

        jeedom.cmd.refreshValue([{ cmd_id: '#id#', value: '#value#', display_value: '#state#', valueDate: '#valueDate#', collectDate: '#collectDate#' }])
    </script>
</div>
