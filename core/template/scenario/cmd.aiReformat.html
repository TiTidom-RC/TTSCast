<div class="input-group input-group-sm" style="width: 100%; padding-top: 1px">
  <span class="input-group-addon roundedLeft" style="width: 120px">{{Options IA}}</span>
  <textarea class="message expressionAttr form-control ta_autosize" data-l1key="options" data-l2key="title" rows="1"
    style="resize:vertical;" data-cmd_id="#id#" data-uid="#uid#"
    placeholder="{{Ex : &quot;aitone&quot;: &quot;professionnel&quot;, &quot;aitemp&quot;: 0.7, &quot;aisysprompt&quot;: &quot;Tu es un assistant&quot;}}">#title#</textarea>
</div>

<div class="input-group input-group-sm" style="width: 100%; padding-top: 1px">
  <span class="input-group-addon roundedLeft" style="width: 120px">{{Texte}}</span>
  <textarea class="message expressionAttr form-control ta_autosize" data-l1key="options" data-l2key="message" rows="1"
    style="resize:vertical;" data-cmd_id="#id#" data-uid="#uid#">#message#</textarea>
  <span class="input-group-btn">
    <button class="btn btn-default listDeviceInfoAiReformatMessage roundedRight" type="button"
      title="{{Sélectionner la commande}}" data-cmd_id="#id#" data-uid="#uid#"><i class="fas fa-list-alt"></i></button>
  </span>
</div>

<div class="input-group input-group-sm" style="width: 100%; padding-top: 1px">
  <span class="input-group-addon roundedLeft" style="width: 120px">{{Enregistrer dans}}</span>
  <textarea class="message expressionAttr form-control ta_autosize" data-l1key="options" data-l2key="storeTarget" rows="1"
    style="resize:vertical;" data-cmd_id="#id#" data-uid="#uid#"
    placeholder="{{Ex : maVariable ou #[Objet][Eq][Cmd]#}}">#storeTarget#</textarea>
  <span class="input-group-btn">
    <button class="btn btn-default listDeviceInfoAiReformatTarget roundedRight" type="button"
      title="{{Sélectionner la commande}}" data-cmd_id="#id#" data-uid="#uid#"><i class="fas fa-list-alt"></i></button>
  </span>
</div>

<script>
  document.querySelector('.listDeviceInfoAiReformatMessage[data-uid="#uid#"]').addEventListener('click', function () {
    jeedom.cmd.getSelectModal({}, function (result) {
      document.querySelector('.expressionAttr[data-l1key=options][data-l2key=message][data-uid="#uid#"]').insertAtCursor(result.human)
    })
  })

  document.querySelector('.listDeviceInfoAiReformatTarget[data-uid="#uid#"]').addEventListener('click', function () {
    jeedom.cmd.getSelectModal({ cmd: { type: 'info', subType: 'string' } }, function (result) {
      document.querySelector('.expressionAttr[data-l1key=options][data-l2key=storeTarget][data-uid="#uid#"]').insertAtCursor(result.human)
    })
  })

  var _storeTargetEl = document.querySelector('.expressionAttr[data-uid="#uid#"][data-l1key=options][data-l2key=storeTarget]')
  if (!_storeTargetEl.value || _storeTargetEl.value === '#' + 'storeTarget#') _storeTargetEl.value = ''
</script>
